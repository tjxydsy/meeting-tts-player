appId: com.meeting-tts-player.app
productName: Meeting TTS Player
copyright: Copyright 2026
directories:
  buildResources: assets
  output: dist
files:
  - src/**/*
  - package.json
asar: true
npmRebuild: false
win:
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Meeting TTS Player
  artifactName: "${productName}-${version}-Setup.${ext}"
